services:
  - type: web
    name: presecurescan-a
    runtime: python
    repo: https://github.com/PrinshiGuj/PreSecureScan-A
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
